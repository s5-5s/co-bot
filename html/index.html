<html lang="ru">
  <head>
    <title>co-bot</title>
    <link rel="stylesheet" href="../css/index.css">

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="../new-js/index.js"></script>
  </head>
  <body>
    <div class="base-layout">
      <div class="data-out">
        <div id="joints-out" class="joints-out">
          <div><span class="data-name">current-x: </span><span id="current-x" class="data-value">0.000</span></div>
          <div><span class="data-name">current-y: </span><span id="current-y" class="data-value">0.000</span></div>
          <div><span class="data-name">current-z: </span><span id="current-z" class="data-value">0.000</span></div>
          <div><span class="data-name">joint6: </span><span id="joint6-value" class="data-value">0.00</span></div>
          <div><span class="data-name">joint5: </span><span id="joint5-value" class="data-value">0.00</span></div>
          <div><span class="data-name">joint4: </span><span id="joint4-value" class="data-value">0.00</span></div>
          <div><span class="data-name">joint3: </span><span id="joint3-value" class="data-value">0.00</span></div>
          <div><span class="data-name">joint2: </span><span id="joint2-value" class="data-value">0.00</span></div>
          <div><span class="data-name">joint1: </span><span id="joint1-value" class="data-value">0.00</span></div>
        </div>
      </div>

      <div class="model-view"></div>

      <div class="data-in">
        <div class="target-in">
          <input id="target-x" inputmode="decimal" placeholder="target x">
          <input id="target-y" inputmode="decimal" placeholder="target y">
          <input id="target-z" inputmode="decimal" placeholder="target z">
          <button id="target-ok">ок</button>
          <button id="target-reset">сброс</button>
        </div>
      </div>
    </div>
  </body>
</html>
